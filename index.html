<link rel="manifest" href="manifest.json">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OmniBiz Master Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-950 antialiased selection:bg-blue-500/30">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [pinInput, setPinInput] = useState("");
            const [view, setView] = useState('summary');
            const [showForm, setShowForm] = useState(false);
            
            // --- SECURE STORAGE ENGINE ---
            const secureSave = (k, d) => localStorage.setItem(k, btoa(unescape(encodeURIComponent(JSON.stringify(d)))));
            const secureLoad = (k, def) => {
                const s = localStorage.getItem(k);
                try { return s ? JSON.parse(decodeURIComponent(escape(atob(s)))) : def; } catch { return def; }
            };

            // --- APP STATE ---
            const [config, setConfig] = useState(() => secureLoad('omni_vFinal_cfg', { 
                bizName: "Blessed Kids Academy", 
                bizSub: "Business Hub", 
                pin: "1234",
                appIcon: "🏫" 
            }));
            const [inventory, setInventory] = useState(() => secureLoad('omni_vFinal_inv', []));
            const [appointments, setAppointments] = useState(() => secureLoad('omni_vFinal_app', []));
            const [expenses, setExpenses] = useState(() => secureLoad('omni_vFinal_exp', []));
            const [revenue, setRevenue] = useState(() => secureLoad('omni_vFinal_rev', 0));

            // --- AUTO-SAVE ---
            useEffect(() => {
                if(isAuthenticated) {
                    secureSave('omni_vFinal_inv', inventory);
                    secureSave('omni_vFinal_app', appointments);
                    secureSave('omni_vFinal_exp', expenses);
                    secureSave('omni_vFinal_cfg', config);
                    secureSave('omni_vFinal_rev', revenue);
                }
            }, [inventory, appointments, expenses, config, revenue, isAuthenticated]);

            const handleLogin = (e) => {
                e.preventDefault();
                if(pinInput === config.pin) {
                    setIsAuthenticated(true);
                } else {
                    alert("❌ Invalid PIN");
                    setPinInput("");
                }
            };

            const totalExp = expenses.reduce((a, b) => a + b.amount, 0);
            const profit = revenue - totalExp;

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen bg-slate-950 flex items-center justify-center p-6 text-left">
                        <div className="bg-white p-10 rounded-[3rem] w-full max-w-sm text-center shadow-2xl animate-fade-up">
                            <div className="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-6 text-5xl shadow-inner border border-slate-100 overflow-hidden">
                                {config.appIcon.length < 5 ? config.appIcon : <img src={config.appIcon} className="w-full h-full object-cover" />}
                            </div>
                            <h1 className="text-3xl font-black text-slate-900 mb-2 leading-tight">{config.bizName}</h1>
                            <p className="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mb-10">Admin Access Required</p>
                            <form onSubmit={handleLogin} className="space-y-6">
                                <input 
                                    type="password" value={pinInput} onChange={e=>setPinInput(e.target.value)} 
                                    placeholder="••••" className="w-full text-center text-5xl p-5 bg-slate-50 border-2 border-slate-100 rounded-[2.5rem] focus:border-blue-600 outline-none transition-all placeholder:text-slate-200 shadow-inner" 
                                    maxLength="4" autoFocus
                                />
                                <button type="submit" className="w-full bg-blue-600 text-white py-5 rounded-[2.5rem] font-black text-lg shadow-xl shadow-blue-500/20 active:scale-95 transition-all">UNLOCK SYSTEM</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen pb-36 relative shadow-2xl overflow-x-hidden no-scrollbar text-left font-sans">
                    <header className="bg-blue-700 p-8 pb-20 rounded-b-[4rem] text-white shadow-2xl relative">
                        <div className="flex items-center gap-4">
                            <div className="w-16 h-16 bg-white/20 backdrop-blur-md rounded-3xl flex items-center justify-center text-3xl shadow-inner overflow-hidden border border-white/20">
                                {config.appIcon.length < 5 ? config.appIcon : <img src={config.appIcon} className="w-full h-full object-cover" />}
                            </div>
                            <div className="flex-1 min-w-0">
                                <h1 className="text-2xl font-black truncate leading-none mb-1">{config.bizName}</h1>
                                <p className="opacity-70 text-[9px] font-black uppercase tracking-[0.2em] truncate">{config.bizSub}</p>
                            </div>
                            <button onClick={() => setIsAuthenticated(false)} className="text-xl opacity-50">🔒</button>
                        </div>
                    </header>

                    {/* Dashboard Metrics */}
                    <div className="px-6 -mt-12 grid grid-cols-2 gap-4 relative z-10 text-center">
                        <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-50">
                            <p className="text-slate-400 text-[9px] font-black uppercase tracking-widest mb-1">Revenue</p>
                            <p className="text-xl font-black text-green-600 leading-none">₦{revenue.toLocaleString()}</p>
                        </div>
                        <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-50">
                            <p className="text-slate-400 text-[9px] font-black uppercase tracking-widest mb-1">Expenses</p>
                            <p className="text-xl font-black text-red-500 leading-none">₦{totalExp.toLocaleString()}</p>
                        </div>
                    </div>

                    <main className="p-6 space-y-6">
                        {view === 'summary' && (
                            <div className="space-y-6 animate-fade-up">
                                <div className={`p-10 rounded-[3.5rem] text-center text-white shadow-2xl transition-all ${profit >= 0 ? 'bg-emerald-600 shadow-emerald-200' : 'bg-rose-600 shadow-rose-200'}`}>
                                    <p className="text-[10px] font-black uppercase tracking-[0.3em] opacity-80 mb-2">Net Cash Profit</p>
                                    <p className="text-4xl font-black tracking-tighter italic leading-none">₦{profit.toLocaleString()}</p>
                                </div>
                                
                                <div className="grid gap-3">
                                    <button onClick={()=>{setView('inventory'); setShowForm('inv')}} className="bg-white p-6 rounded-[2.2rem] border border-slate-100 shadow-sm flex items-center justify-between active:scale-95 transition-all">
                                        <div className="flex items-center gap-4">
                                            <span className="text-2xl bg-blue-50 p-3 rounded-2xl">📦</span>
                                            <div><p className="font-black text-slate-900 leading-none mb-1">New Sale</p><p className="text-[9px] text-slate-400 uppercase font-black tracking-widest">Update Stock</p></div>
                                        </div>
                                        <span className="text-blue-600 text-xl font-black mr-2">→</span>
                                    </button>
                                    <button onClick={()=>{setView('services'); setShowForm('appt')}} className="bg-white p-6 rounded-[2.2rem] border border-slate-100 shadow-sm flex items-center justify-between active:scale-95 transition-all text-purple-600">
                                        <div className="flex items-center gap-4">
                                            <span className="text-2xl bg-purple-50 p-3 rounded-2xl">📅</span>
                                            <div><p className="font-black text-slate-900 leading-none mb-1">Book Client</p><p className="text-[9px] text-slate-400 uppercase font-black tracking-widest">Add Schedule</p></div>
                                        </div>
                                        <span className="text-xl font-black mr-2">→</span>
                                    </button>
                                    <button onClick={()=>setShowForm('exp')} className="bg-white p-6 rounded-[2.2rem] border border-slate-100 shadow-sm flex items-center justify-between active:scale-95 transition-all text-red-600">
                                        <div className="flex items-center gap-4">
                                            <span className="text-2xl bg-red-50 p-3 rounded-2xl">💸</span>
                                            <div><p className="font-black text-slate-900 leading-none mb-1">Log Expense</p><p className="text-[9px] text-slate-400 uppercase font-black tracking-widest">Subtract Money</p></div>
                                        </div>
                                        <span className="text-xl font-black mr-2">+</span>
                                    </button>
                                </div>
                            </div>
                        )}

                        {view === 'inventory' && (
                            <div className="space-y-4 animate-fade-up">
                                <div className="flex justify-between items-center px-2">
                                    <h2 className="font-black text-2xl text-slate-900 tracking-tighter italic uppercase">Stock</h2>
                                    <button onClick={()=>setShowForm('inv')} className="bg-blue-700 text-white text-[10px] font-black px-6 py-2.5 rounded-full shadow-lg">+ ADD NEW</button>
                                </div>
                                {inventory.map(i => (
                                    <div key={i.id} className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm flex justify-between items-center">
                                        <div className="flex-1 min-w-0 pr-4">
                                            <p className="font-black text-slate-900 text-lg truncate mb-1">{i.name}</p>
                                            <p className="text-green-600 font-black">₦{i.price.toLocaleString()}</p>
                                        </div>
                                        <div className="text-right flex flex-col items-end gap-3">
                                            <div className="flex items-center gap-2">
                                                <span className={`text-[10px] font-black px-3 py-1 rounded-full ${i.stock < 5 ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-slate-100 text-slate-500'}`}>{i.stock} LEFT</span>
                                                <button onClick={()=>{if(confirm("Delete item?")) setInventory(inventory.filter(x=>x.id!==i.id))}} className="text-slate-200">✕</button>
                                            </div>
                                            <button 
                                                onClick={()=>{if(i.stock>0){setInventory(inventory.map(x=>x.id===i.id?{...x, stock:x.stock-1}:x)); setRevenue(revenue+i.price)}}} 
                                                className={`text-[10px] font-black px-6 py-3 rounded-2xl shadow-lg active:scale-90 transition-all ${i.stock > 0 ? 'bg-blue-700 text-white' : 'bg-slate-100 text-slate-300 pointer-events-none'}`}
                                            >
                                                {i.stock > 0 ? 'SELL UNIT' : 'SOLD OUT'}
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'services' && (
                            <div className="space-y-4 animate-fade-up">
                                <div className="flex justify-between items-center px-2 text-purple-700">
                                    <h2 className="font-black text-2xl tracking-tighter italic uppercase">Bookings</h2>
                                    <button onClick={()=>setShowForm('appt')} className="bg-purple-700 text-white text-[10px] font-black px-6 py-2.5 rounded-full shadow-lg">+ ADD</button>
                                </div>
                                {appointments.map(a => (
                                    <div key={a.id} className="bg-white p-6 rounded-[2.5rem] border-l-[12px] border-purple-600 shadow-sm flex justify-between items-center relative">
                                        <div className="pr-10">
                                            <p className="font-black text-slate-900 text-lg mb-1">{a.client}</p>
                                            <p className="text-slate-400 text-xs italic font-medium mb-3">{a.service}</p>
                                            <span className="bg-purple-50 text-purple-700 font-black text-[10px] px-3 py-1.5 rounded-full uppercase tracking-tighter italic">🕒 {a.time}</span>
                                        </div>
                                        <button onClick={()=>{if(confirm("Remove booking?")) setAppointments(appointments.filter(x=>x.id!==a.id))}} className="text-slate-200 text-xl p-2">✕</button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'settings' && (
                            <div className="space-y-6 animate-fade-up">
                                <h2 className="font-black text-2xl text-slate-900 px-2 tracking-tighter uppercase italic">App Setup</h2>
                                <form onSubmit={e => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    setConfig({ 
                                        bizName: fd.get('n') || config.bizName, 
                                        bizSub: fd.get('s') || config.bizSub, 
                                        pin: fd.get('p') || config.pin,
                                        appIcon: fd.get('icon') || config.appIcon
                                    });
                                    alert("🎉 System Configuration Updated!");
                                    setView('summary');
                                }} className="bg-white p-8 rounded-[3rem] border border-slate-100 shadow-2xl space-y-6">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">Choose System Icon</label>
                                        <div className="flex gap-2 flex-wrap mb-4">
                                            {["🏫", "📚", "💼", "🛒", "🛠️", "💡", "💰"].map(e => (
                                                <button key={e} type="button" onClick={()=>document.getElementById('ic').value=e} className="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center hover:bg-blue-100 transition-all text-2xl border shadow-sm">{e}</button>
                                            ))}
                                        </div>
                                        <input id="ic" name="icon" defaultValue={config.appIcon} placeholder="Emoji" className="w-full p-5 bg-slate-50 rounded-2xl font-black outline-blue-600 border-none shadow-inner" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-1 block">Business Name</label>
                                        <input name="n" defaultValue={config.bizName} className="w-full p-5 bg-slate-50 rounded-2xl font-black outline-blue-600 border-none shadow-inner" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-1 block">New PIN</label>
                                        <input name="p" defaultValue={config.pin} maxLength="4" className="w-full p-5 bg-slate-50 rounded-2xl font-black outline-blue-600 border-none shadow-inner" />
                                    </div>
                                    <button className="w-full bg-slate-950 text-white py-6 rounded-[2.5rem] font-black shadow-xl uppercase tracking-widest">Save Config</button>
                                </form>
                                <button onClick={()=>{if(confirm("DANGER: WIPE ALL DATA?")){localStorage.clear(); window.location.reload();}}} className="w-full text-red-500 text-[10px] font-black tracking-widest uppercase bg-red-50 py-6 rounded-[2.5rem] border border-red-100">⚠️ Factory Reset</button>
                            </div>
                        )}
                    </main>

                    {/* MODAL FORMS */}
                    {showForm && (
                        <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[100] flex items-end sm:items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-[3.5rem] p-10 shadow-2xl animate-fade-up relative">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="font-black text-3xl tracking-tighter uppercase italic">Add Record</h2>
                                    <button onClick={()=>setShowForm(false)} className="text-5xl text-slate-200 leading-none">&times;</button>
                                </div>
                                {showForm === 'inv' && (
                                    <form onSubmit={e => {
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        setInventory([...inventory, {id:Date.now(), name:fd.get('n'), price:Number(fd.get('p')), stock:Number(fd.get('s'))}]);
                                        setShowForm(false);
                                    }} className="space-y-4">
                                        <input name="n" placeholder="Item Name" className="w-full p-6 bg-slate-50 rounded-2xl font-black outline-blue-600 shadow-inner" required />
                                        <input name="p" type="number" placeholder="Price (₦)" className="w-full p-6 bg-slate-50 rounded-2xl font-black outline-blue-600 shadow-inner" required />
                                        <input name="s" type="number" placeholder="Stock Qty" className="w-full p-6 bg-slate-50 rounded-2xl font-black outline-blue-600 shadow-inner" required />
                                        <button className="w-full bg-blue-700 text-white py-6 rounded-[2.5rem] font-black text-lg shadow-2xl mt-4">ADD TO STOCK</button>
                                    </form>
                                )}
                                {showForm === 'appt' && (
                                    <form onSubmit={e => {
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        setAppointments([...appointments, {id:Date.now(), client:fd.get('c'), service:fd.get('s'), time:fd.get('t')}]);
                                        setShowForm(false);
                                    }} className="space-y-4">
                                        <input name="c" placeholder="Client Name" className="w-full p-6 bg-slate-50 rounded-2xl font-black outline-purple-600 shadow-inner" required />
                                        <input name="s" placeholder="Service Needed" className="w-full p-6 bg-slate-50 rounded-2xl font-black outline-purple-600 shadow-inner" required />
                                        <input name="t" type="time" className="w-full p-6 bg-slate-50 rounded-2xl font-black outline-purple-600 shadow-inner" required />
                                        <button className="w-full bg-purple-700 text-white py-6 rounded-[2.5rem] font-black text-lg shadow-2xl mt-4">BOOK NOW</button>
                                    </form>
                                )}
                                {showForm === 'exp' && (
                                    <form onSubmit={e => {
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        setExpenses([...expenses, {id:Date.now(), amount:Number(fd.get('a')), category:fd.get('c')}]);
                                        setShowForm(false);
                                    }} className="space-y-4">
                                        <input name="c" placeholder="Reason (e.g. Fuel)" className="w-full p-6 bg-slate-50 rounded-2xl font-black outline-red-600 shadow-inner" required />
                                        <input name="a" type="number" placeholder="Amount (₦)" className="w-full p-6 bg-slate-50 rounded-2xl font-black outline-red-600 shadow-inner" required />
                                        <button className="w-full bg-rose-600 text-white py-6 rounded-[2.5rem] font-black text-lg shadow-2xl mt-4 tracking-widest uppercase">Log Expense</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Master Navigation Bar */}
                    <nav className="fixed bottom-8 left-8 right-8 max-w-md mx-auto bg-white/95 backdrop-blur-2xl h-24 rounded-[3rem] shadow-[0_40px_80px_-15px_rgba(0,0,0,0.5)] flex items-center justify-around px-4 border border-white/20 z-50">
                        <button onClick={()=>setView('summary')} className={`p-5 transition-all duration-300 rounded-[2.2rem] ${view==='summary'?'text-blue-700 scale-125 shadow-xl bg-blue-50':'text-slate-300'}`}>🏠</button>
                        <button onClick={()=>setView('inventory')} className={`p-5 transition-all duration-300 rounded-[2.2rem] ${view==='inventory'?'text-blue-700 scale-125 shadow-xl bg-blue-50':'text-slate-300'}`}>📦</button>
                        <button onClick={()=>setView('services')} className={`p-5 transition-all duration-300 rounded-[2.2rem] ${view==='services'?'text-blue-700 scale-125 shadow-xl bg-blue-50':'text-slate-300'}`}>📋</button>
                        <button onClick={()=>setView('settings')} className={`p-5 transition-all duration-300 rounded-[2.2rem] ${view==='settings'?'text-blue-700 scale-125 shadow-xl bg-blue-50':'text-slate-300'}`}>⚙️</button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
