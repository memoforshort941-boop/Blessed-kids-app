<!DOCTYPE html>
<html lang="en">
<head> 
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OmniBiz Master Pro Max</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-950 antialiased selection:bg-blue-500/30">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [pinInput, setPinInput] = useState("");
            const [view, setView] = useState('summary');
            const [showForm, setShowForm] = useState(false);
            
            // --- SECURE STORAGE ENGINE ---
            const secureSave = (k, d) => localStorage.setItem(k, btoa(unescape(encodeURIComponent(JSON.stringify(d)))));
            const secureLoad = (k, def) => {
                const s = localStorage.getItem(k);
                try { return s ? JSON.parse(decodeURIComponent(escape(atob(s)))) : def; } catch { return def; }
            };

            // --- APP STATE (Merged Final + Pro) ---
            const [config, setConfig] = useState(() => secureLoad('omni_vFinal_cfg', { 
                bizName: "Blessed Kids Academy", 
                bizSub: "Business Hub", 
                pin: "1234",
                appIcon: "🏫" 
            }));
            const [inventory, setInventory] = useState(() => secureLoad('omni_vFinal_inv', []));
            const [appointments, setAppointments] = useState(() => secureLoad('omni_vFinal_app', []));
            const [expenses, setExpenses] = useState(() => secureLoad('omni_vFinal_exp', []));
            const [debts, setDebts] = useState(() => secureLoad('omni_vFinal_debt', []));
            const [revenue, setRevenue] = useState(() => secureLoad('omni_vFinal_rev', 0));

            // --- AUTO-SAVE ---
            useEffect(() => {
                if(isAuthenticated) {
                    secureSave('omni_vFinal_inv', inventory);
                    secureSave('omni_vFinal_app', appointments);
                    secureSave('omni_vFinal_exp', expenses);
                    secureSave('omni_vFinal_debt', debts);
                    secureSave('omni_vFinal_cfg', config);
                    secureSave('omni_vFinal_rev', revenue);
                }
            }, [inventory, appointments, expenses, debts, config, revenue, isAuthenticated]);

            const handleLogin = (e) => {
                e.preventDefault();
                if(pinInput === config.pin) setIsAuthenticated(true);
                else { alert("❌ Invalid PIN"); setPinInput(""); }
            };

            const totalExp = expenses.reduce((a, b) => a + b.amount, 0);
            const totalDebts = debts.reduce((a, b) => a + b.amount, 0);
            const profit = revenue - totalExp;

            const shareReceipt = (name, price, status) => {
                const msg = `*${config.bizName.toUpperCase()}*%0A---%0A*RECEIPT*%0AItem: ${name}%0AAmount: ₦${price.toLocaleString()}%0AStatus: ${status}%0A---%0A_Thank you for choosing us!_`;
                window.open(`https://wa.me/?text=${msg}`);
            };

            const exportBackup = () => {
                const data = { inventory, appointments, expenses, debts, revenue, config };
                const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `OmniBiz_Pro_Backup_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen bg-slate-950 flex items-center justify-center p-6 text-left">
                        <div className="bg-white p-10 rounded-[3rem] w-full max-w-sm text-center shadow-2xl animate-fade-up">
                            <div className="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-6 text-5xl shadow-inner border border-slate-100 overflow-hidden">
                                {config.appIcon.length < 5 ? config.appIcon : <img src={config.appIcon} className="w-full h-full object-cover" />}
                            </div>
                            <h1 className="text-3xl font-black text-slate-900 mb-2 leading-tight">{config.bizName}</h1>
                            <p className="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mb-10">Admin Access Required</p>
                            <form onSubmit={handleLogin} className="space-y-6">
                                <input 
                                    type="password" value={pinInput} onChange={e=>setPinInput(e.target.value)} 
                                    placeholder="••••" className="w-full text-center text-5xl p-5 bg-slate-50 border-2 border-slate-100 rounded-[2.5rem] focus:border-blue-600 outline-none shadow-inner" 
                                    maxLength="4" autoFocus
                                />
                                <button type="submit" className="w-full bg-blue-600 text-white py-5 rounded-[2.5rem] font-black text-lg shadow-xl active:scale-95 transition-all">UNLOCK SYSTEM</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto bg-slate-50 min-h-screen pb-36 relative shadow-2xl overflow-x-hidden no-scrollbar text-left font-sans">
                    <header className="bg-blue-700 p-8 pb-20 rounded-b-[4rem] text-white shadow-2xl relative">
                        <div className="flex items-center gap-4">
                            <div className="w-16 h-16 bg-white/20 backdrop-blur-md rounded-3xl flex items-center justify-center text-3xl shadow-inner overflow-hidden border border-white/20">
                                {config.appIcon.length < 5 ? config.appIcon : <img src={config.appIcon} className="w-full h-full object-cover" />}
                            </div>
                            <div className="flex-1 min-w-0">
                                <h1 className="text-2xl font-black truncate leading-none mb-1">{config.bizName}</h1>
                                <p className="opacity-70 text-[9px] font-black uppercase tracking-[0.2em] truncate">{config.bizSub}</p>
                            </div>
                            <button onClick={() => setIsAuthenticated(false)} className="text-xl bg-black/10 p-3 rounded-2xl">🔒</button>
                        </div>
                    </header>

                    {/* Dashboard Metrics */}
                    <div className="px-6 -mt-12 grid grid-cols-2 gap-4 relative z-10 text-center">
                        <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-50">
                            <p className="text-slate-400 text-[9px] font-black uppercase tracking-widest mb-1">Revenue</p>
                            <p className="text-xl font-black text-green-600">₦{revenue.toLocaleString()}</p>
                        </div>
                        <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-50">
                            <p className="text-slate-400 text-[9px] font-black uppercase tracking-widest mb-1 text-red-500">Debts</p>
                            <p className="text-xl font-black text-red-500">₦{totalDebts.toLocaleString()}</p>
                        </div>
                    </div>

                    <main className="p-6 space-y-6">
                        {view === 'summary' && (
                            <div className="space-y-6 animate-fade-up">
                                <div className={`p-10 rounded-[3.5rem] text-center text-white shadow-2xl transition-all ${profit >= 0 ? 'bg-emerald-600 shadow-emerald-200' : 'bg-rose-600 shadow-rose-200'}`}>
                                    <p className="text-[10px] font-black uppercase tracking-[0.3em] opacity-80 mb-2">Net Cash Profit</p>
                                    <p className="text-4xl font-black tracking-tighter italic leading-none">₦{profit.toLocaleString()}</p>
                                </div>
                                
                                <div className="grid gap-3">
                                    <button onClick={()=>{setView('inventory')}} className="bg-white p-6 rounded-[2.2rem] border border-slate-100 shadow-sm flex items-center justify-between active:scale-95 transition-all">
                                        <div className="flex items-center gap-4">
                                            <span className="text-2xl bg-blue-50 p-3 rounded-2xl">📦</span>
                                            <div><p className="font-black text-slate-900 mb-1 leading-none">Sales/Stock</p><p className="text-[9px] text-slate-400 uppercase font-black tracking-widest">Update Items</p></div>
                                        </div>
                                        <span className="text-blue-600 text-xl font-black mr-2">→</span>
                                    </button>
                                    <button onClick={()=>{setView('services')}} className="bg-white p-6 rounded-[2.2rem] border border-slate-100 shadow-sm flex items-center justify-between active:scale-95 transition-all text-purple-600">
                                        <div className="flex items-center gap-4">
                                            <span className="text-2xl bg-purple-50 p-3 rounded-2xl">📅</span>
                                            <div><p className="font-black text-slate-900 mb-1 leading-none">Bookings</p><p className="text-[9px] text-slate-400 uppercase font-black tracking-widest">Client Schedules</p></div>
                                        </div>
                                        <span className="text-xl font-black mr-2">→</span>
                                    </button>
                                    <button onClick={()=>setShowForm('debt')} className="bg-white p-6 rounded-[2.2rem] border border-slate-100 shadow-sm flex items-center justify-between active:scale-95 transition-all text-orange-600">
                                        <div className="flex items-center gap-4">
                                            <span className="text-2xl bg-orange-50 p-3 rounded-2xl">📝</span>
                                            <div><p className="font-black text-slate-900 mb-1 leading-none">Log Debt</p><p className="text-[9px] text-slate-400 uppercase font-black tracking-widest">Credit Sales</p></div>
                                        </div>
                                        <span className="text-xl font-black mr-2">+</span>
                                    </button>
                                    <button onClick={()=>setShowForm('exp')} className="bg-white p-6 rounded-[2.2rem] border border-slate-100 shadow-sm flex items-center justify-between active:scale-95 transition-all text-red-600">
                                        <div className="flex items-center gap-4">
                                            <span className="text-2xl bg-red-50 p-3 rounded-2xl">💸</span>
                                            <div><p className="font-black text-slate-900 mb-1 leading-none">Expense</p><p className="text-[9px] text-slate-400 uppercase font-black tracking-widest">Log Spending</p></div>
                                        </div>
                                        <span className="text-xl font-black mr-2">+</span>
                                    </button>
                                </div>
                            </div>
                        )}

                        {view === 'inventory' && (
                            <div className="space-y-4 animate-fade-up">
                                <div className="flex justify-between items-center px-2">
                                    <h2 className="font-black text-2xl text-slate-900 tracking-tighter uppercase italic">Inventory</h2>
                                    <button onClick={()=>setShowForm('inv')} className="bg-blue-700 text-white text-[10px] font-black px-6 py-2.5 rounded-full shadow-lg">+ NEW ITEM</button>
                                </div>
                                {inventory.map(i => (
                                    <div key={i.id} className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm flex justify-between items-center">
                                        <div className="flex-1 min-w-0 pr-4">
                                            <p className="font-black text-slate-900 text-lg truncate mb-1">{i.name}</p>
                                            <p className="text-green-600 font-black">₦{i.price.toLocaleString()}</p>
                                        </div>
                                        <div className="text-right flex flex-col items-end gap-3">
                                            <div className="flex items-center gap-2">
                                                <span className={`text-[10px] font-black px-3 py-1 rounded-full ${i.stock < 5 ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-slate-100 text-slate-500'}`}>{i.stock} LEFT</span>
                                                <button onClick={()=>{if(confirm("Delete item?")) setInventory(inventory.filter(x=>x.id!==i.id))}} className="text-slate-200">✕</button>
                                            </div>
                                            <button 
                                                onClick={()=>{if(i.stock>0){setInventory(inventory.map(x=>x.id===i.id?{...x, stock:x.stock-1}:x)); setRevenue(revenue+i.price); if(confirm("WhatsApp Receipt?")) shareReceipt(i.name, i.price, "Paid Full")}}} 
                                                className={`text-[10px] font-black px-6 py-3 rounded-2xl shadow-lg active:scale-90 transition-all ${i.stock > 0 ? 'bg-blue-700 text-white' : 'bg-slate-100 text-slate-300 pointer-events-none'}`}
                                            >
                                                SELL UNIT
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'services' && (
                            <div className="space-y-4 animate-fade-up">
                                <div className="flex justify-between items-center px-2 text-purple-700">
                                    <h2 className="font-black text-2xl tracking-tighter uppercase italic">Bookings</h2>
                                    <button onClick={()=>setShowForm('appt')} className="bg-purple-700 text-white text-[10px] font-black px-6 py-2.5 rounded-full shadow-lg">+ ADD</button>
                                </div>
                                {appointments.map(a => (
                                    <div key={a.id} className="bg-white p-6 rounded-[2.5rem] border-l-[12px] border-purple-600 shadow-sm flex justify-between items-center relative">
                                        <div className="pr-10">
                                            <p className="font-black text-slate-900 text-lg mb-1">{a.client}</p>
                                            <p className="text-slate-400 text-xs italic font-medium mb-3">{a.service}</p>
                                            <span className="bg-purple-50 text-purple-700 font-black text-[10px] px-3 py-1.5 rounded-full uppercase tracking-tighter italic">🕒 {a.time}</span>
                                        </div>
                                        <button onClick={()=>{if(confirm("Remove booking?")) setAppointments(appointments.filter(x=>x.id!==a.id))}} className="text-slate-200 text-xl p-2">✕</button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'debts' && (
                            <div className="space-y-4 animate-fade-up">
                                <div className="flex justify-between items-center px-2 text-orange-600">
                                    <h2 className="font-black text-2xl tracking-tighter uppercase italic">Debtors</h2>
                                    <button onClick={()=>setShowForm('debt')} className="bg-orange-600 text-white text-[10px] font-black px-6 py-2.5 rounded-full shadow-lg">+ LOG DEBT</button>
                                </div>
                                {debts.map(d => (
                                    <div key={d.id} className="bg-white p-6 rounded-[2.5rem] border-l-[12px] border-orange-500 shadow-sm flex justify-between items-center">
                                        <div>
                                            <p className="font-black text-slate-900 text-lg mb-1">{d.client}</p>
                                            <p className="text-orange-600 font-black text-xl mb-1">₦{d.amount.toLocaleString()}</p>
                                            <p className="text-slate-400 text-[10px] uppercase font-black">{d.reason}</p>
                                        </div>
                                        <div className="flex flex-col gap-2">
                                            <button onClick={()=>{setRevenue(revenue+d.amount); setDebts(debts.filter(x=>x.id!==d.id)); alert("Revenue updated!")}} className="bg-emerald-100 text-emerald-700 text-[9px] font-black px-4 py-3 rounded-xl uppercase">Clear</button>
                                            <button onClick={()=>{const msg = `Reminder from ${config.bizName}: Hi ${d.client}, friendly reminder of your balance ₦${d.amount.toLocaleString()}.`; window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);}} className="bg-blue-50 text-blue-700 text-[9px] font-black px-4 py-3 rounded-xl uppercase">Remind</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'settings' && (
                            <div className="space-y-6 animate-fade-up">
                                <h2 className="font-black text-2xl text-slate-900 px-2 tracking-tighter uppercase italic">Setup</h2>
                                <div className="bg-white p-8 rounded-[3rem] shadow-xl space-y-4">
                                    <button onClick={exportBackup} className="w-full bg-emerald-600 text-white py-5 rounded-3xl font-black uppercase tracking-widest shadow-lg">📥 Download Backup</button>
                                </div>
                                <form onSubmit={e => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    setConfig({ 
                                        bizName: fd.get('n') || config.bizName, 
                                        bizSub: fd.get('s') || config.bizSub, 
                                        pin: fd.get('p') || config.pin,
                                        appIcon: fd.get('icon') || config.appIcon
                                    });
                                    alert("🎉 Updated!");
                                    setView('summary');
                                }} className="bg-white p-8 rounded-[3rem] shadow-2xl space-y-6">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">System Icon</label>
                                        <input id="ic" name="icon" defaultValue={config.appIcon} className="w-full p-5 bg-slate-50 rounded-2xl font-black outline-blue-600 border-none" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 block">Biz Name</label>
                                        <input name="n" defaultValue={config.bizName} className="w-full p-5 bg-slate-50 rounded-2xl font-black outline-blue-600 border-none" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 block">Biz Slogan</label>
                                        <input name="s" defaultValue={config.bizSub} className="w-full p-5 bg-slate-50 rounded-2xl font-black outline-blue-600 border-none" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 block">Login PIN</label>
                                        <input name="p" defaultValue={config.pin} maxLength="4" className="w-full p-5 bg-slate-50 rounded-2xl font-black outline-blue-600 border-none" />
                                    </div>
                                    <button className="w-full bg-slate-950 text-white py-6 rounded-[2.5rem] font-black shadow-xl uppercase tracking-widest">Save Config</button>
                                </form>
                                <button onClick={()=>{if(confirm("WIPE ALL DATA?")){localStorage.clear(); window.location.reload();}}} className="w-full text-red-500 text-[10px] font-black tracking-widest uppercase bg-red-50 py-6 rounded-[2.5rem] border border-red-100">⚠️ Factory Reset</button>
                            </div>
                        )}
                    </main>

                    {/* MODAL FORMS (All merged) */}
                    {showForm && (
                        <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[100] flex items-end sm:items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-[3.5rem] p-10 shadow-2xl animate-fade-up relative">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="font-black text-3xl tracking-tighter uppercase italic">Add Entry</h2>
                                    <button onClick={()=>setShowForm(false)} className="text-4xl text-slate-200 leading-none">&times;</button>
                                </div>
                                {showForm === 'inv' && (
                                    <form onSubmit={e => {
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        setInventory([...inventory, {id:Date.now(), name:fd.get('n'), price:Number(fd.get('p')), stock:Number(fd.get('s'))}]);
                                        setShowForm(false);
                                    }} className="space-y-4">
                                        <input name="n" placeholder="Item Name" className="w-full p-6 bg-slate-50 rounded-2xl font-black outline-blue-600" required />
                                        <input name="p" type="number" placeholder="Price (₦)" className="w-full p-6 bg-slate-50 rounded-2xl font-black outline-blue-600" required />
                                        <input name="s" type="number" placeholder="Stock Qty" className="w-full p-6 bg-slate-50 rounded-2xl font-black outline-blue-600" required />
                                        <button className="w-full bg-blue-700 text-white py-6 rounded-[2.5rem] font-black text-lg mt-4">ADD TO STOCK</button>
                                    </form>
                                )}
                                {showForm === 'appt' && (
                                    <form onSubmit={e => {
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        setAppointments([...appointments, {id:Date.now(), client:fd.get('c'), service:fd.get('s'), time:fd.get('t')}]);
                                        setShowForm(false);
                                    }} className="space-y-4">
                                        <input name="c" placeholder="Client Name" className="w-full p-6 bg-slate-50 rounded-2xl font-black outline-purple-600 shadow-inner" required />
                                        <input name="s" placeholder="Service Needed" className="w-full p-6 bg-slate-50 rounded-2xl font-black outline-purple-600 shadow-inner" required />
                                        <input name="t" type="time" className="w-full p-6 bg-slate-50 rounded-2xl font-black outline-purple-600 shadow-inner" required />
                                        <button className="w-full bg-purple-700 text-white py-6 rounded-[2.5rem] font-black text-lg mt-4">BOOK NOW</button>
                                    </form>
                                )}
                                {showForm === 'debt' && (
                                    <form onSubmit={e => {
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        setDebts([...debts, {id:Date.now(), client:fd.get('c'), amount:Number(fd.get('a')), reason:fd.get('r')}]);
                                        setShowForm(false);
                                    }} className="space-y-4">
                                        <input name="c" placeholder="Client Name" className="w-full p-6 bg-slate-50 rounded-2xl font-black outline-orange-600 shadow-inner" required />
                                        <input name="a" type="number" placeholder="Amount (₦)" className="w-full p-6 bg-slate-50 rounded-2xl font-black outline-orange-600 shadow-inner" required />
                                        <input name="r" placeholder="Reason" className="w-full p-6 bg-slate-50 rounded-2xl font-black outline-orange-600 shadow-inner" required />
                                        <button className="w-full bg-orange-600 text-white py-6 rounded-[2.5rem] font-black text-lg mt-4">LOG DEBT</button>
                                    </form>
                                )}
                                {showForm === 'exp' && (
                                    <form onSubmit={e => {
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        setExpenses([...expenses, {id:Date.now(), amount:Number(fd.get('a')), category:fd.get('c')}]);
                                        setShowForm(false);
                                    }} className="space-y-4">
                                        <input name="c" placeholder="Reason (e.g. Fuel)" className="w-full p-6 bg-slate-50 rounded-2xl font-black outline-red-600" required />
                                        <input name="a" type="number" placeholder="Amount (₦)" className="w-full p-6 bg-slate-50 rounded-2xl font-black outline-red-600" required />
                                        <button className="w-full bg-rose-600 text-white py-6 rounded-[2.5rem] font-black text-lg mt-4">LOG EXPENSE</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Master Navigation Bar (Merged Tabs) */}
                    <nav className="fixed bottom-8 left-8 right-8 max-w-md mx-auto bg-slate-900 h-24 rounded-[3rem] shadow-2xl flex items-center justify-around px-4 z-50">
                        <button onClick={()=>setView('summary')} className={`p-4 transition-all ${view==='summary'?'text-blue-400 bg-white/10 rounded-full':'text-slate-500'}`}>🏠</button>
                        <button onClick={()=>setView('inventory')} className={`p-4 transition-all ${view==='inventory'?'text-blue-400 bg-white/10 rounded-full':'text-slate-500'}`}>📦</button>
                        <button onClick={()=>setView('services')} className={`p-4 transition-all ${view==='services'?'text-blue-400 bg-white/10 rounded-full':'text-slate-500'}`}>📅</button>
                        <button onClick={()=>setView('debts')} className={`p-4 transition-all ${view==='debts'?'text-orange-400 bg-white/10 rounded-full':'text-slate-500'}`}>📝</button>
                        <button onClick={()=>setView('settings')} className={`p-4 transition-all ${view==='settings'?'text-blue-400 bg-white/10 rounded-full':'text-slate-500'}`}>⚙️</button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    {/* OFFLINE SERVICE WORKER REGISTRATION */}
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => {
                console.log('OmniBiz: Offline Protected');
                reg.onupdatefound = () => {
                    const installingWorker = reg.installing;
                    installingWorker.onstatechange = () => {
                        if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            if(confirm("New Update Available! Refresh now?")) window.location.reload();
                        }
                    };
                };
            })
            .catch(err => console.log('Offline setup failed.', err));
        });
      }
    </script>
</body>
</html>
